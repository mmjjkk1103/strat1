
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표정 기분 체크</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-controls" aria-label="화면 테마 선택">
            <button class="theme-toggle active" type="button" data-theme="light" aria-pressed="true">화이트모드</button>
            <button class="theme-toggle" type="button" data-theme="dark" aria-pressed="false">다크모드</button>
        </div>

        <main class="mood-checker">
            <p class="eyebrow">AI 표정 분석</p>
            <h1>지금 표정으로 기분 체크</h1>
            <div class="mood-result" aria-live="polite">
                <div id="mood-emoji" class="mood-emoji">🙂</div>
                <p id="mood-title">카메라를 시작해 주세요</p>
                <p id="mood-confidence">표정을 보고 기분 좋은 상태와 좋지 않은 상태를 구분합니다.</p>
            </div>

            <button id="start-camera" type="button">카메라 시작</button>

            <div id="webcam-container" class="webcam-container" aria-label="카메라 미리보기"></div>
            <div class="upload-panel">
                <label for="image-upload">이미지 파일로 분석</label>
                <input id="image-upload" type="file" accept="image/*">
                <img id="image-preview" class="image-preview" alt="업로드한 표정 이미지 미리보기">
            </div>
            <div id="label-container" class="label-container" aria-label="분석 결과"></div>
        </main>

        <section class="contact-section" aria-labelledby="contact-title">
            <h2 id="contact-title">제휴 문의</h2>
            <form class="contact-form" action="https://formspree.io/f/xojrbwwv" method="POST">
                <label for="partner-name">이름</label>
                <input id="partner-name" name="name" type="text" autocomplete="name" required>

                <label for="partner-email">이메일</label>
                <input id="partner-email" name="email" type="email" autocomplete="email" required>

                <label for="partner-message">문의 내용</label>
                <textarea id="partner-message" name="message" rows="4" required></textarea>

                <button type="submit">문의 보내기</button>
            </form>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
