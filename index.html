<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-1003771485403609">
    <title>동물상 AI 얼굴 분석</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1003771485403609"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-controls" aria-label="화면 테마 선택">
            <button class="theme-toggle active" type="button" data-theme="light" aria-pressed="true">화이트모드</button>
            <button class="theme-toggle" type="button" data-theme="dark" aria-pressed="false">다크모드</button>
        </div>

        <main class="animal-checker">
            <p class="eyebrow">AI 동물상 분석</p>
            <h1>나는 무슨 동물상일까?</h1>
            <p class="intro-copy">얼굴 분위기와 인상 특징을 분석해 나와 가장 가까운 동물상을 찾아드립니다.</p>

            <section class="action-card" aria-label="사진 입력">
                <div class="button-row">
                    <label class="primary-button" for="image-upload">사진 첨부하기</label>
                    <button id="start-camera" class="secondary-button" type="button">카메라로 테스트하기</button>
                </div>
                <input id="image-upload" class="file-input" type="file" accept="image/jpeg,image/jpg,image/png,image/webp">

                <div id="camera-panel" class="camera-panel" hidden>
                    <video id="camera-video" class="camera-video" autoplay playsinline muted></video>
                    <div class="camera-actions">
                        <button id="capture-photo" type="button">촬영하기</button>
                        <button id="retake-photo" type="button" hidden>다시 찍기</button>
                    </div>
                </div>

                <div id="preview-panel" class="preview-panel" hidden>
                    <img id="image-preview" class="image-preview" alt="분석할 얼굴 이미지 미리보기">
                    <button id="analyze-button" type="button">AI 분석 시작</button>
                </div>

                <p id="status-message" class="status-message" aria-live="polite">얼굴이 정면으로 잘 보이는 사진을 사용하면 결과가 더 자연스럽습니다.</p>
            </section>

            <section id="loading-panel" class="loading-panel" hidden aria-live="polite">
                <div class="loader" aria-hidden="true"></div>
                <p class="loading-title">얼굴의 인상과 특징을 분석하고 있어요...</p>
                <p class="loading-copy">눈매, 얼굴형, 입꼬리, 전체 분위기를 종합 중입니다.</p>
            </section>

            <section id="result-panel" class="result-panel" hidden aria-live="polite">
                <div id="winner-card" class="winner-card"></div>
                <div class="feature-card">
                    <h2>얼굴 특징 분석</h2>
                    <div id="feature-comments" class="feature-comments"></div>
                </div>
                <div class="top-card">
                    <h2>당신에게 강하게 나타난 동물상 TOP 3</h2>
                    <div id="top-three" class="top-three"></div>
                </div>
                <div class="score-card">
                    <h2>전체 동물상 점수</h2>
                    <div id="score-list" class="score-list"></div>
                </div>
                <p class="disclaimer">본 테스트는 얼굴의 인상과 분위기를 바탕으로 한 재미용 AI 콘텐츠입니다.</p>
                <button id="reset-button" type="button">다른 사진으로 다시 테스트하기</button>
            </section>
        </main>

        <section class="contact-section" aria-labelledby="contact-title">
            <h2 id="contact-title">제휴 문의</h2>
            <form class="contact-form" action="https://formspree.io/f/xojrbwwv" method="POST">
                <label for="partner-name">이름</label>
                <input id="partner-name" name="name" type="text" autocomplete="name" required>

                <label for="partner-email">이메일</label>
                <input id="partner-email" name="email" type="email" autocomplete="email" required>

                <label for="partner-message">문의 내용</label>
                <textarea id="partner-message" name="message" rows="4" required></textarea>

                <button type="submit">문의 보내기</button>
            </form>
        </section>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
