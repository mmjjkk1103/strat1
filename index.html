
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-controls" aria-label="화면 테마 선택">
            <button class="theme-toggle active" type="button" data-theme="light" aria-pressed="true">화이트모드</button>
            <button class="theme-toggle" type="button" data-theme="dark" aria-pressed="false">다크모드</button>
        </div>
        <h1>로또 번호 생성기</h1>
        <div class="numbers">
            <!-- Numbers will be generated here -->
        </div>
        <button id="generate">번호 생성</button>

        <section class="contact-section" aria-labelledby="contact-title">
            <h2 id="contact-title">제휴 문의</h2>
            <form class="contact-form" action="https://formspree.io/f/xojrbwwv" method="POST">
                <label for="partner-name">이름</label>
                <input id="partner-name" name="name" type="text" autocomplete="name" required>

                <label for="partner-email">이메일</label>
                <input id="partner-email" name="email" type="email" autocomplete="email" required>

                <label for="partner-message">문의 내용</label>
                <textarea id="partner-message" name="message" rows="4" required></textarea>

                <button type="submit">문의 보내기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
